name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test-and-eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Release regression gate
        run: python scripts/run_release_check.py

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build production image
        run: docker build -t production-support-agent-lab:ci .
      - name: Smoke package inside image
        env:
          APP_TENANT_ID: tenant_live
          APP_INTERNAL_API_KEY: internal-key
          APP_ACTOR_SIGNATURE_SECRET: actor-signing-secret-with-32-byte-minimum
        run: |
          docker run --rm \
            -e APP_TENANT_ID \
            -e APP_INTERNAL_API_KEY \
            -e APP_ACTOR_SIGNATURE_SECRET \
            production-support-agent-lab:ci \
            python scripts/sign_actor_headers.py \
              --user-id user_prod \
              --roles user \
              --scopes "crm:read,order:read,shipping:read,ticket:write,kb:read" \
              --timestamp 1783014000 \
              --nonce nonce_docker_smoke_1234567890 \
              --method POST \
              --path /api/v1/chat/sessions \
              --body '{"user_id":"user_prod"}' \
              --format json
