name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test-and-eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Package health
        run: python -m pip check
      - name: Production header signer smoke
        env:
          APP_TENANT_ID: tenant_live
          APP_INTERNAL_API_KEY: internal-key
          APP_ACTOR_SIGNATURE_SECRET: actor-signing-secret-with-32-byte-minimum
        run: |
          support-agent-sign-headers \
            --user-id user_prod \
            --roles user \
            --scopes "crm:read,order:read,shipping:read,ticket:write,kb:read" \
            --timestamp 1783014000 \
            --format json
      - name: Unit tests
        run: python -m pytest
      - name: Golden eval
        run: python scripts/run_eval.py
      - name: Security regression eval
        run: python scripts/run_eval.py examples/evals/security_regression.json
      - name: Tool failure regression eval
        run: python scripts/run_eval.py examples/evals/tool_failure_regression.json
      - name: Memory multiturn regression eval
        run: python scripts/run_eval.py examples/evals/memory_multiturn_regression.json
      - name: Routing regression eval
        run: python scripts/run_eval.py examples/evals/routing_regression.json
      - name: Monitor regression eval
        run: python scripts/run_monitor_eval.py
      - name: Retrieval challenge eval
        run: python scripts/run_retrieval_eval.py

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build production image
        run: docker build -t production-support-agent-lab:ci .
      - name: Smoke package inside image
        env:
          APP_TENANT_ID: tenant_live
          APP_INTERNAL_API_KEY: internal-key
          APP_ACTOR_SIGNATURE_SECRET: actor-signing-secret-with-32-byte-minimum
        run: |
          docker run --rm \
            -e APP_TENANT_ID \
            -e APP_INTERNAL_API_KEY \
            -e APP_ACTOR_SIGNATURE_SECRET \
            production-support-agent-lab:ci \
            python scripts/sign_actor_headers.py \
              --user-id user_prod \
              --roles user \
              --scopes "crm:read,order:read,shipping:read,ticket:write,kb:read" \
              --timestamp 1783014000 \
              --format json
